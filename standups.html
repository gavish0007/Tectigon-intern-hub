<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standups - Tectigon Intern Hub</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <aside class="sidebar">
            <div class="logo-section">
            <a href="index.html">
                <img src="images/image.png" alt="Tectigon Logo">
            </a>
            </div>   

            <!-- <div class="logo-section">
                <img src="images/image.png" alt="Tectigon Logo">
            </div> -->

            <ul>

                <li>
                    <a href="index.html">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="tasks.html">
                        <i class="fa-solid fa-list-check"></i>
                        Tasks
                    </a>
                </li>

                <li class="active">
                    <a href="standups.html">
                        <i class="fa-solid fa-clipboard"></i>
                        Standups
                    </a>
                </li>

                <li>
                    <a href="attendance.html">
                        <i class="fa-solid fa-calendar"></i>
                        Attendance
                    </a>
                </li>

                <li>
                    <a href="team.html">
                        <i class="fa-solid fa-users"></i>
                        Team
                    </a>
                </li>

                <li>
                    <a href="resources.html">
                        <i class="fa-solid fa-book"></i>
                        Resources
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <i class="fa-solid fa-user"></i>
                        Profile
                    </a>
                </li>

            </ul>

        </aside>

        <!-- Main Content -->

        <main class="main-content">

            <nav class="navbar">

                <h2>Daily Standup</h2>

                <div class="nav-right">
                    <i class="fa-solid fa-bell"></i>
                    <img src="images\logo.png" alt="profile">
                </div>

            </nav>

            <section class="standup-grid">

                <div class="standup-card">

                    <h3>Yesterday's Work</h3>

                    <textarea placeholder="Describe yesterday's work...">
        </textarea>

                </div>

                <div class="standup-card">

                    <h3>Today's Plan</h3>

                    <textarea placeholder="Describe today's plan...">
        </textarea>

                </div>

            </section>

            <section class="standup-grid">

                <div class="standup-card">

                    <h3>Blockers</h3>

                    <textarea placeholder="Mention blockers...">
        </textarea>

                </div>

                <div class="standup-card">

                    <h3>Last Submitted</h3>

                    <p>
                        Dashboard completed.
                    </p>

                    <p>
                        Working on Tasks page.
                    </p>

                    <p>
                        No blockers.
                    </p>

                </div>

            </section>

            <button class="submit-btn">
                Submit Standup
            </button>

        </main>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
